<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Museu Nacional</title>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Normalize CSS -->
    <link rel="stylesheet" href="css/normalize.css">
    <!-- Estilo CSS -->
    <link rel="stylesheet" type="text/css" href="css/style.css">

    <!--[if lt IE 9]>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv-printshiv.min.js"></script>
    <![endif]-->

</head>
<body>

    <div id="container"> <!-- start container -->

        <header> <!-- start header -->
            <div id="logo">
                <h1><a href="#">Museu Nacional</a></h1>
            </div>

            <nav> <!-- start nav -->
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Exposições</a></li>
                    <li><a href="#">Pesquisas</a></li>
                    <li><a href="#">Acervos</a></li>
                    <li><a href="#">Vídeos</a></li>
                    <li><a href="#">Fotos</a></li>
                    <li><a href="#">contato</a></li>
                </ul>
            </nav> <!-- end nav-->
            
        </header> <!-- end header -->

        <main> <!-- start main -->
            <div id="conteudo">
                <section id="capa">
                    <img src="images/museu.png" alt="">

                </section>
            </div>

            <aside>
                <section id="depoimento">
                    <img src="images/depoimento.png" alt="">
                </section>
                <section id="visita"> <!-- start visita -->
                    <h4>Faça uma visita</h4>
                    <form>
                        <fieldset>
                            <legend>Seleciona uma data</legend>
                            <label for="data">Data</label>
                            <input class="campo" type="text" id="data" value="dd/mm/aaaa">

                            <label for="qtd">Qtd pessoas</label>
                            <input class="campo" style="width: 30px;" type="number" id="qtd" value="1">
                        </fieldset>

                        <input class="botao" type="submit" value="Verificar disponibilidade">
                    </form>

                </section> <!-- end visita -->

                <section id="galeria">
                    <h1>Galeria de fotos</h1>
                    <a href="#">
                        <img src="images/imagem1.jpg" height="93" width="93" alt="descrição img">
                    </a>
                    <a href="#">
                        <img src="images/imagem2.jpg" height="93" width="93" alt="descrição img">
                    </a>
                    <a href="#">
                        <img src="images/imagem3.jpg" height="93" width="93" alt="descrição img">
                    </a>
                    <a href="#">
                        <img src="images/imagem4.jpg" height="93" width="93" alt="descrição img">
                    </a>
                </section>
            </aside>
        </main> <!-- end main -->

    </div> <!-- end container -->
    
</body>
</html>
